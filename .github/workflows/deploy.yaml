# name: "Deploy to Docker Desktop Kubernetes"
name: Azure & Terraform Validation Test

on:
  push:
    branches:
      - main  # your branch

permissions:
    id-token: write
    contents: read

    # Global Configuration: Shared by ALL jobs and steps automatically
env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  test-azure-and-tf:
    name: Azure Login and TF Plan Test
    runs-on: ubuntu-latest
 
    steps:
      # Step 1: Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ./terraform/Spoke1

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform/Spoke1

      # - name: Terraform plan
